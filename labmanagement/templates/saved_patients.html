<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saved Patients</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #e9fdf6, #f5faf9);
      font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
      padding: 20px;
      color: #333;
    }

    .card {
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      border: none;
      background-color: #fff;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      max-height: 85vh; /* limit card height */
      overflow-y: auto; /* internal scroll */
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .table-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 10px;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
      padding-bottom: 10px;
    }

    .table-top h4 {
      font-weight: 600;
      color: #008970;
      text-shadow: 0 1px 1px rgba(0,0,0,0.05);
    }

    .btn-secondary {
      background: linear-gradient(90deg, #868686, #6c757d);
      border: none;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: linear-gradient(90deg, #6c757d, #545b62);
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(90deg, #008970, #006D5B);
      border: none;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #00a383, #007c68);
      transform: translateY(-2px);
    }

    table.dataTable thead {
      background: linear-gradient(90deg, #008970, #006D5B);
      color: #fff;
    }

    table.dataTable tbody tr:hover {
      background-color: #e9fdf6 !important;
    }

    .dataTables_wrapper .dataTables_filter input {
      border-radius: 6px;
      border: 1px solid #ccc;
      padding: 5px 8px;
      outline: none;
      transition: all 0.2s ease-in-out;
    }

    .dataTables_wrapper .dataTables_filter input:focus {
      border-color: #00a383;
      box-shadow: 0 0 0 0.15rem rgba(0, 137, 112, 0.25);
    }

    /* DataTables export buttons styling */
    .dt-buttons .btn {
      background: linear-gradient(90deg, #008970, #006D5B) !important;
      color: white !important;
      border: none !important;
      border-radius: 6px !important;
      transition: all 0.3s ease;
    }

    .dt-buttons .btn:hover {
      background: linear-gradient(90deg, #00a383, #007c68) !important;
      transform: translateY(-2px);
    }

    /* Responsive tweaks */
    @media (max-width: 576px) {
      .table-top h4 {
        font-size: 1.1rem;
        text-align: center;
        width: 100%;
      }
      .table-top .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="card p-3 p-md-4">
      <div class="table-top">
        <h4 class="mb-0">💾 Saved Patients</h4>
        <a href="{{ url_for('patients.patients_home') }}" class="btn btn-secondary">
          ⬅ Back
        </a>
      </div>

      <div class="table-responsive">
        <table id="savedTable" class="display table table-striped table-hover align-middle w-100">
          <thead>
            <tr>
              <th>MR No</th>
              <th>Name</th>
              <th>Age</th>
              <th>Gender</th>
              <th>Doctor</th>
              <th>Tests</th>
              <th>Amount</th>
              <th>Receipt</th>
            </tr>
          </thead>
          <tbody>
            {% for p in patients %}
            <tr>
              <td>{{ p.mr_no }}</td>
              <td>{{ p.name }}</td>
              <td>{{ p.age }}</td>
              <td>{{ p.gender }}</td>
              <td>{{ p.doctor }}</td>
              <td>{{ p.tests }}</td>
              <td>{{ p.amount }}</td>
              <td>
                <a href="{{ url_for('patients.generate_pdf', mr_no=p.mr_no) }}" class="btn btn-sm btn-primary">
                  PDF
                </a>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>

  <script>
    $(document).ready(function () {
      $('#savedTable').DataTable({
        dom: 'Bfrtip',
        buttons: ['copy', 'csv', 'excel', 'pdf', 'print'],
        responsive: true,
        pageLength: 10
      });
    });
  </script>
</body>
</html>
