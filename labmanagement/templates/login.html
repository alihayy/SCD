<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Citi Lab Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #E9FFDB, #D9EDD2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .login-wrapper {
      display: flex;
      width: 900px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
      background: #fff;
    }

    /* Left side for image */
    .login-left {
      flex: 1;
      background: #006D5B;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-left img {
      max-width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* Right side for login */
    .login-right {
      flex: 1;
      background: linear-gradient(135deg, #E9FFDB, #D9EDD2);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .login-box {
      position: relative;
      width: 100%;
      max-width: 350px;
      border-radius: 15px;
      padding: 30px;
      background: #fff;
      z-index: 1;
    }

    /* Gradient animated border */
    .login-box::before {
      content: "";
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border-radius: 20px;
      background: linear-gradient(270deg, #006D5B, #008080, #E9FFDB, #D9EDD2, #006D5B);
      background-size: 400% 400%;
      animation: animateBorder 8s linear infinite;
      z-index: -1;
      filter: blur(10px);
    }

    @keyframes animateBorder {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-title {
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.6rem;
      background: linear-gradient(135deg, #006D5B, #008080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, #006D5B, #008080);
      border: none;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #004c3e, #006D5B);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <!-- Left side image -->
    <div class="login-left">
      <img src="{{ url_for('static', filename='images/lab.jpg') }}" alt="Citi Lab">
    </div>

    <!-- Right side login form -->
    <div class="login-right">
      <div class="login-box">
        <h3 class="login-title">Welcome to Citi Lab</h3>
        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
      </div>
    </div>
  </div>

</body>
</html>
